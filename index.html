<html lang="nl">
<head>
<meta charset="UTF-8"/>

<title>LiftLog</title>

</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="config.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ── Config from config.js ──
const SUPABASE_URL  = window.LIFTLOG_URL  || “not-set”;
const SUPABASE_KEY  = window.LIFTLOG_KEY  || “not-set”;
const ADMIN_CODE    = window.LIFTLOG_ADMIN || “LIFTLOG-ADMIN”;
const IS_LIVE       = SUPABASE_URL !== “not-set” && SUPABASE_URL !== “JOUW_SUPABASE_URL”;
const sb            = IS_LIVE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

// ── Storage ──
async function sget(key) {
if (sb) { try { const {data} = await sb.from(“liftlog”).select(“value”).eq(“key”,key).maybeSingle(); return data ? JSON.parse(data.value) : null; } catch { return null; } }
try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
}
async function sset(key, val) {
if (sb) { try { await sb.from(“liftlog”).upsert({key, value:JSON.stringify(val), updated_at:new Date().toISOString()},{onConflict:“key”}); } catch {} }
else { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
}
async function sdel(key) {
if (sb) { try { await sb.from(“liftlog”).delete().eq(“key”,key); } catch {} }
else { try { localStorage.removeItem(key); } catch {} }
}

// ── Keys ──
const USERS_KEY    = “ll-users”;
const LAST_KEY     = “ll-last”;
const ANN_KEY      = “ll-ann”;
const logsKey      = n => `ll-logs-${n}`;
const splitKey     = n => `ll-split-${n}`;
const weightKey    = n => `ll-weight-${n}`;

// ── Default split ──
const DEFAULT_SPLIT = [
{id:“ua”,name:“Upper A”,color:”#FF6B35”,focus:“Borst, Rug & Armen”,exercises:[“Bench Press”,“Incline Smith Machine”,“Lat Pulldown”,“Machine Row”,“Lateral Raises”,“Tricep Pushdown”]},
{id:“la”,name:“Lower A”,color:”#FFD60A”,focus:“Quads & Hamstrings”,exercises:[“Squat”,“Romanian Deadlift”,“Leg Press”,“Leg Curl”,“Calf Raises”]},
{id:“ub”,name:“Upper B”,color:”#4CC9F0”,focus:“Pull Focus”,exercises:[“Deadlift”,“Lat Pulldown”,“Single Arm Pulldown 45°”,“Incline Smith Machine”,“Hammer Curl”,“Face Pulls”]},
{id:“lb”,name:“Lower B”,color:”#7B2FBE”,focus:“Hamstrings & Billen”,exercises:[“Romanian Deadlift”,“Leg Press”,“Walking Lunges”,“Leg Extension”,“Calf Raises”]},
{id:“uc”,name:“Upper C”,color:”#06D6A0”,focus:“Armen & Volume”,exercises:[“Bench Press”,“Machine Row”,“Lat Pulldown smal grip”,“JM Press”,“Bicep Curl Machine”,“Face Pulls”]},
];
const COLORS = [”#FF6B35”,”#FFD60A”,”#4CC9F0”,”#7B2FBE”,”#06D6A0”,”#FF4D6D”,”#F77F00”,”#A0C4FF”];

// ── Helpers ──
const today = () => new Date().toISOString().split(“T”)[0];
function weekStart() { const d=new Date(),day=d.getDay(),diff=day===0?6:day-1; d.setDate(d.getDate()-diff); return d.toISOString().split(“T”)[0]; }
function getRIRColor(r) { if(r<=0)return”#ff4444”; if(r===1)return”#FF6B35”; if(r===2)return”#FFD60A”; return”#06D6A0”; }
function calcWeekly(logs) {
const ws=weekStart(); let sessions=0,volume=0;
Object.entries(logs).forEach(([k,v])=>{ if(k.split(”|”)[1]>=ws){sessions++; Object.values(v).forEach(sets=>sets.forEach(s=>{volume+=(s.weight||0)*s.reps;}));} });
return {sessions,volume:Math.round(volume)};
}
function calcStreak(logs) {
const dates=[…new Set(Object.keys(logs).map(k=>k.split(”|”)[1]))].sort().reverse();
if(!dates.length)return 0;
let streak=0,cur=new Date();
for(const d of dates){if(Math.round((cur-new Date(d))/86400000)>1)break;streak++;cur=new Date(d);}
return streak;
}
function resizeImage(file,max=200){return new Promise(r=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{const ratio=Math.min(max/img.width,max/img.height,1),c=document.createElement(“canvas”);c.width=img.width*ratio;c.height=img.height*ratio;c.getContext(“2d”).drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);r(c.toDataURL(“image/jpeg”,.75));};img.src=url;});}

// ── CSS ──
const CSS = `@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap'); *{box-sizing:border-box;margin:0;padding:0;} .app{min-height:100vh;background:#0a0a0a;color:#f0f0f0;font-family:'Barlow',sans-serif;max-width:500px;margin:0 auto;} .hdr{padding:18px 20px 12px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:10px;} .hdr-back{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding-right:8px;} .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:2px;text-transform:uppercase;flex:1;} .logo span{color:#FF6B35;} .nav{display:flex;border-bottom:1px solid #1a1a1a;background:#0a0a0a;position:sticky;top:0;z-index:10;overflow-x:auto;} .nb{flex:1;min-width:56px;background:none;border:none;color:#555;padding:12px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;} .nb.on{color:#FF6B35;border-bottom-color:#FF6B35;} .pg{padding:20px;} .sec{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:10px;} .card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;margin-bottom:12px;} .ucard{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s;} .ucard:hover{border-color:#333;} .scard{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;} .scard:hover{border-color:#333;} .sbar{position:absolute;left:0;top:0;bottom:0;width:3px;} .fl{font-family:'Barlow Condensed',sans-serif;} .f9{font-weight:900;} .fin{background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:11px 14px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:15px;width:100%;outline:none;} .fin:focus{border-color:#FF6B35;} .si{background:#1a1a1a;border:1px solid #222;border-radius:7px;padding:9px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:14px;width:100%;text-align:center;outline:none;} .si:focus{border-color:#FF6B35;} .si::placeholder{color:#333;} .bp{width:100%;background:#FF6B35;border:none;border-radius:10px;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:2px;text-transform:uppercase;padding:14px;cursor:pointer;} .bp:hover{background:#ff8555;} .bp:disabled{background:#2a2a2a;color:#555;cursor:not-allowed;} .bg{width:100%;background:none;border:1px solid #252525;border-radius:10px;color:#888;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;padding:12px;cursor:pointer;margin-top:8px;} .bg:hover{border-color:#444;color:#ccc;} .bn{width:100%;background:none;border:2px dashed #252525;border-radius:14px;padding:18px;color:#444;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:4px;} .bn:hover{border-color:#444;color:#777;} .ab{background:#FF6B35;border:none;border-radius:7px;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;padding:0 14px;cursor:pointer;} .sb{width:100%;background:#FF6B35;border:none;border-radius:12px;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:2px;text-transform:uppercase;padding:15px;cursor:pointer;margin-top:8px;} .cr{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;} .cd{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;} .cd.on{border-color:white;transform:scale(1.15);} .le{background:#111;border:1px solid #1e1e1e;border-radius:12px;margin-bottom:14px;overflow:hidden;} .lh{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #161616;} .ln{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;} .sc{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#555;} .st{padding:8px 14px;} .sh{display:grid;grid-template-columns:24px 1fr 1fr 1fr 24px;gap:6px;padding:3px 0 7px;border-bottom:1px solid #161616;margin-bottom:2px;} .ch{font-size:9px;color:#3a3a3a;text-align:center;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;} .sr{display:grid;grid-template-columns:24px 1fr 1fr 1fr 24px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #141414;} .sr:last-child{border-bottom:none;} .sn{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#444;font-weight:700;} .sv{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-align:center;} .sl{font-size:9px;color:#444;text-align:center;display:block;} .rm{background:none;border:none;color:#2a2a2a;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;} .rm:hover{color:#ff4444;} .ar{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:7px;padding:9px 14px 13px;border-top:1px solid #161616;} .il{font-size:9px;color:#444;text-align:center;display:block;margin-bottom:3px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;} .rb{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;} .hi{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;} .pb{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:20px 20px 0;margin-bottom:20px;} .pi{flex:1;max-width:140px;display:flex;flex-direction:column;align-items:center;gap:6px;} .pk{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:24px;} .lr{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;} .gr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 20px 20px;} .gc{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px;text-align:center;} .ss{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;margin-bottom:12px;} .ssi{flex:1;background:#1a1a1a;border:1px solid #252525;border-radius:7px;padding:8px 10px;color:#f0f0f0;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;outline:none;} .ssi:focus{border-color:#FF6B35;} .ei{flex:1;background:#1a1a1a;border:1px solid #222;border-radius:6px;padding:7px 10px;color:#f0f0f0;font-family:'Barlow',sans-serif;font-size:13px;outline:none;} .ei:focus{border-color:#FF6B35;} .em{text-align:center;padding:40px 20px;color:#333;} .sw{background:none;border:1px solid #1e1e1e;border-radius:6px;color:#555;padding:5px 9px;cursor:pointer;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;}`;

// ── Avatar ──
function Av({user,size=36,style={}}) {
if(user&&user.photo) return <img src={user.photo} alt={user.name} style={{width:size,height:size,borderRadius:“50%”,objectFit:“cover”,border:`2px solid ${user.color}`,flexShrink:0,…style}}/>;
return <div style={{width:size,height:size,borderRadius:“50%”,background:(user&&user.color||”#555”)+“22”,border:`2px solid ${user&&user.color||"#555"}`,display:“flex”,alignItems:“center”,justifyContent:“center”,fontFamily:”‘Barlow Condensed’,sans-serif”,fontWeight:900,fontSize:size*.38,color:user&&user.color||”#555”,flexShrink:0,…style}}>{user&&user.initials||”?”}</div>;
}

// ── ExerciseLogger ──
function EL({ex,color,sets,inputVal,prevSets,onIC,onAdd,onRm}) {
return (
<div className="le">
<div className="lh">
<div>
<div className="ln">{ex}</div>
{prevSets&&prevSets.length>0&&<div style={{fontSize:10,color:”#444”,marginTop:2,fontFamily:”‘Barlow Condensed’,sans-serif”}}>Vorig: {prevSets.map(s=>`${s.weight||"—"}kg×${s.reps}`).join(” · “)}</div>}
</div>
<div className="sc">{sets.length} set{sets.length!==1?“s”:””}</div>
</div>
{sets.length>0&&(
<div className="st">
<div className="sh"><div className="ch">#</div><div className="ch">KG</div><div className="ch">Reps</div><div className="ch">RIR</div><div/></div>
{sets.map((s,i)=>(
<div className="sr" key={i}>
<div className="sn">{i+1}</div>
<div className="sv" style={{color}}>{s.weight||”—”}<span className="sl">kg</span></div>
<div className="sv">{s.reps}<span className="sl">reps</span></div>
<div style={{textAlign:“center”}}><span className=“rb” style={{background:getRIRColor(s.rir)+“22”,color:getRIRColor(s.rir)}}>{s.rir}</span></div>
<button className=“rm” onClick={()=>onRm(i)}>×</button>
</div>
))}
</div>
)}
<div className="ar">
<div><span className="il">KG</span><input className=“si” type=“number” placeholder=“60” value={inputVal.weight} onChange={e=>onIC(“weight”,e.target.value)}/></div>
<div><span className="il">Reps</span><input className=“si” type=“number” placeholder=“10” value={inputVal.reps} onChange={e=>onIC(“reps”,e.target.value)}/></div>
<div><span className="il">RIR</span><input className=“si” type=“number” placeholder=“0” min=“0” max=“5” value={inputVal.rir} onChange={e=>onIC(“rir”,e.target.value)}/></div>
<div style={{display:“flex”,alignItems:“flex-end”}}><button className="ab" onClick={onAdd}>+</button></div>
</div>
</div>
);
}

// ── Split Editor ──
function SE({split,onChange}) {
function upd(id,f,v){onChange(split.map(s=>s.id===id?{…s,[f]:v}:s));}
function updEx(id,i,v){const s=split.find(s=>s.id===id);upd(id,“exercises”,s.exercises.map((e,j)=>j===i?v:e));}
function addEx(id){const s=split.find(s=>s.id===id);upd(id,“exercises”,[…s.exercises,””]);}
function rmEx(id,i){const s=split.find(s=>s.id===id);upd(id,“exercises”,s.exercises.filter((_,j)=>j!==i));}
function addS(){const used=split.map(s=>s.color),color=COLORS.find(c=>!used.includes(c))||COLORS[0];onChange([…split,{id:“s”+Date.now(),name:“Nieuw”,color,focus:””,exercises:[””]}]);}
return (
<div className="pg">
<div className="sec" style={{marginBottom:16}}>Jouw Split</div>
{split.map(s=>(
<div className=“ss” key={s.id} style={{borderLeft:`3px solid ${s.color}`}}>
<div style={{display:“flex”,alignItems:“center”,gap:10,marginBottom:10}}>
<div style={{width:14,height:14,borderRadius:“50%”,background:s.color,flexShrink:0}}/>
<input className=“ssi” value={s.name} onChange={e=>upd(s.id,“name”,e.target.value)} placeholder=“Sessienaam”/>
<button onClick={()=>onChange(split.filter(x=>x.id!==s.id))} style={{background:“none”,border:“none”,color:”#333”,cursor:“pointer”,fontSize:18}}>🗑</button>
</div>
<div className="cr" style={{marginBottom:10}}>
{COLORS.map(c=><div key={c} className={`cd${s.color===c?" on":""}`} style={{background:c}} onClick={()=>upd(s.id,“color”,c)}/>)}
</div>
<input className=“fin” style={{marginBottom:10,fontSize:13}} value={s.focus} onChange={e=>upd(s.id,“focus”,e.target.value)} placeholder=“Focus (bijv. Borst & Rug)”/>
<div style={{fontSize:10,color:”#444”,fontFamily:”‘Barlow Condensed’,sans-serif”,letterSpacing:1,textTransform:“uppercase”,marginBottom:6}}>Oefeningen</div>
<div style={{display:“flex”,flexDirection:“column”,gap:5}}>
{s.exercises.map((ex,i)=>(
<div key={i} style={{display:“flex”,gap:6,alignItems:“center”}}>
<input className=“ei” value={ex} onChange={e=>updEx(s.id,i,e.target.value)} placeholder={`Oefening ${i+1}`}/>
<button onClick={()=>rmEx(s.id,i)} style={{background:“none”,border:“none”,color:”#2a2a2a”,cursor:“pointer”,fontSize:16}}>×</button>
</div>
))}
<button onClick={()=>addEx(s.id)} style={{background:“none”,border:“1px dashed #252525”,borderRadius:6,padding:7,color:”#444”,fontSize:13,cursor:“pointer”,width:“100%”,fontFamily:”‘Barlow Condensed’,sans-serif”,letterSpacing:1,textTransform:“uppercase”,marginTop:4}}>+ Oefening toevoegen</button>
</div>
</div>
))}
<button onClick={addS} style={{width:“100%”,background:“none”,border:“2px dashed #222”,borderRadius:12,padding:16,color:”#444”,fontFamily:”‘Barlow Condensed’,sans-serif”,fontWeight:700,fontSize:14,letterSpacing:2,textTransform:“uppercase”,cursor:“pointer”,marginBottom:14}}>+ Sessie toevoegen</button>
</div>
);
}

// ── Progress View ──
function PV({userSplit,userLogs}) {
const [sel,setSel] = useState(null);
function getHist(sName,ex) {
return Object.entries(userLogs).filter(([k])=>k.startsWith(sName+”|”)).map(([k,v])=>({date:k.split(”|”)[1],sets:v[ex]||[]})).filter(e=>e.sets.length>0).sort((a,b)=>b.date.localeCompare(a.date));
}
if(sel) {
const hist=getHist(sel.sName,sel.ex);
return (
<div className="pg">
<button onClick={()=>setSel(null)} style={{background:“none”,border:“none”,color:”#555”,fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:14,letterSpacing:1,textTransform:“uppercase”,cursor:“pointer”,marginBottom:16,padding:0}}>← Terug</button>
<div style={{marginBottom:20}}>
<div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontWeight:900,fontSize:26,textTransform:“uppercase”,color:sel.color,letterSpacing:1}}>{sel.ex}</div>
<div style={{fontSize:12,color:”#555”}}>{sel.sName} · {hist.length} sessie{hist.length!==1?“s”:””}</div>
</div>
{hist.length===0?<div className="em"><div style={{fontSize:40,marginBottom:10}}>📊</div><div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:14,letterSpacing:1,textTransform:“uppercase”}}>Nog geen data</div></div>
:hist.map((entry,i)=>(
<div key={i} className="card" style={{marginBottom:10}}>
<div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontWeight:700,fontSize:13,color:”#555”,letterSpacing:1,textTransform:“uppercase”,marginBottom:10}}>
{new Date(entry.date).toLocaleDateString(“nl-NL”,{weekday:“long”,day:“numeric”,month:“long”})}
</div>
<div style={{display:“grid”,gridTemplateColumns:“24px 1fr 1fr 1fr”,gap:6,marginBottom:6}}>
{[”#”,“KG”,“Reps”,“RIR”].map(h=><div key={h} style={{fontSize:10,color:”#333”,fontFamily:”‘Barlow Condensed’,sans-serif”,textTransform:“uppercase”,textAlign:“center”}}>{h}</div>)}
</div>
{entry.sets.map((s,j)=>(
<div key={j} style={{display:“grid”,gridTemplateColumns:“24px 1fr 1fr 1fr”,gap:6,padding:“5px 0”,borderTop:“1px solid #161616”}}>
<div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:13,color:”#444”,fontWeight:700}}>{j+1}</div>
<div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:15,fontWeight:700,color:sel.color,textAlign:“center”}}>{s.weight||”—”}<span style={{fontSize:9,color:”#555”,display:“block”}}>kg</span></div>
<div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:15,fontWeight:700,textAlign:“center”}}>{s.reps}<span style={{fontSize:9,color:”#555”,display:“block”}}>reps</span></div>
<div style={{textAlign:“center”}}><span className=“rb” style={{background:getRIRColor(s.rir)+“22”,color:getRIRColor(s.rir)}}>{s.rir}</span></div>
</div>
))}
</div>
))}
</div>
);
}
if(!Object.keys(userLogs).length) return <div className="pg"><div className="em"><div style={{fontSize:40,marginBottom:10}}>📈</div><div style={{fontFamily:”‘Barlow Condensed’,sans-serif”,fontSize:14,letterSpacing:1,textTransform:“uppercase”}}>Log eerst sessies</div></div></div>;
return (
<div className="pg">
{userSplit.map(s=>{
const rel=s.exercises.filter(e=>getHist(s.name,e).length>0);
if(!rel.length)return null;
return (
<div key={s.id} style={{marginBottom:24}}>

useEffect(()=>{
async function init(){
try {
const users=await sget(USERS_KEY)||[];
const lastName=localStorage.getItem(LAST_KEY);
const annData=await sget(ANN_KEY);
setAllUsers(users);
if(annData)setAnn(annData);
const last=lastName&&users.find(u=>u.name===lastName);
if(last&&!last.pin){await loadU(last,users);}
else{setScreen(“users”);}
} catch(e) { setScreen(“users”); }
}
init();
},[]);

async function loadU(u,users) {
try {
const [s,l,w]=await Promise.all([sget(splitKey(u.name)),sget(logsKey(u.name)),sget(weightKey(u.name))]);
setUser(u); setSplit(s||DEFAULT_SPLIT); setLogs(l||{}); setWeights(w||{});
localStorage.setItem(LAST_KEY,u.name);
if(users)setAllUsers(users);
setScreen(“dashboard”);
} catch(e) { setScreen(“users”); }
}

async function createUser(){
if(!newName.trim())return;
const u={name:newName.trim(),color:newColor,initials:newName.trim().slice(0,2).toUpperCase(),pin:newPin.length===4?newPin:null,photo:newPhoto||null};
const updated=[…allUsers,u];
await sset(USERS_KEY,updated);
await sset(splitKey(u.name),DEFAULT_SPLIT);
setAllUsers(updated); setNewName(””); setNewColor(COLORS[0]); setNewPin(””); setNewPhoto(null);
loadU(u,updated);
}

function startSes(s){
setActiveS(s);
const tk=`${s.name}|${today()}`;
const ex=logs[tk]||{};
const lk=Object.keys(logs).filter(k=>k.startsWith(s.name+”|”)&&k!==tk).sort((a,b)=>b.localeCompare(a))[0];
const ld=lk?logs[lk]:{};
const init={},ii={};
s.exercises.filter(e=>e.trim()).forEach(ex2=>{
if(ex[ex2]&&ex[ex2].length){init[ex2]=ex[ex2];}
else{const p=ld[ex2]||[];init[ex2]=p.length?[0,1,2].map(()=>({…p[p.length-1],ts:Date.now()})):[];}
const ls=ld[ex2]&&ld[ex2][0];
ii[ex2]={weight:ls&&ls.weight?String(ls.weight):””,reps:ls&&ls.reps?String(ls.reps):””,rir:“0”};
});
setCurSets(init); setInputs(ii); setPrevD(ld); setScreen(“log”);
}

const onIC=useCallback((ex,f,v)=>setInputs(p=>({…p,[ex]:{…p[ex],[f]:v}})),[]);
const onAdd=useCallback((ex)=>setInputs(pi=>{
const vals=pi[ex]||{};
const weight=parseFloat(vals.weight)||0,reps=parseInt(vals.reps)||0,rir=parseInt(vals.rir||0);
if(!reps)return pi;
setCurSets(p=>({…p,[ex]:[…(p[ex]||[]),{weight,reps,rir,ts:Date.now()}]}));
return{…pi,[ex]:{weight:vals.weight||””,reps:””,rir:“0”}};
}),[]);
const onRm=useCallback((ex,idx)=>setCurSets(p=>({…p,[ex]:p[ex].filter((_,i)=>i!==idx)})),[]);

async function saveSes(){
const k=`${activeS.name}|${today()}`,updated={…logs,[k]:curSets};
setLogs(updated); await sset(logsKey(user.name),updated); setScreen(“saved”);
}
async function saveSplit(ns){setSplit(ns);await sset(splitKey(user.name),ns);setScreen(“dashboard”);}
async function saveW(date,val){const updated={…weights,[date]:val};setWeights(updated);await sset(weightKey(user.name),updated);}

async function loadAdmin(){const users=await sget(USERS_KEY)||[];setAdminUsers(users);}
async function adminDel(name){const updated=allUsers.filter(u=>u.name!==name);await sset(USERS_KEY,updated);await sdel(logsKey(name));await sdel(splitKey(name));await sdel(weightKey(name));setAllUsers(updated);setAdminUsers(updated);}
async function adminReset(name){await sdel(logsKey(name));await sdel(splitKey(name));await sdel(weightKey(name));await sset(splitKey(name),DEFAULT_SPLIT);await loadAdmin();}
async function adminResetPin(name){const updated=allUsers.map(u=>u.name===name?{…u,pin:null}:u);await sset(USERS_KEY,updated);setAllUsers(updated);setAdminUsers(updated);}
async function adminAnn(text){const a={text,date:new Date().toISOString()};await sset(ANN_KEY,a);setAnn(a);}
async function adminClearAnn(){await sdel(ANN_KEY);setAnn(null);}
